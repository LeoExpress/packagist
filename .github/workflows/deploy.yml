name: Deploy Satis to Pages

on:
  push:
    branches:
      - master
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Clean output directory
        run: rm -rf output

      - name: Checkout Satis configuration
        uses: actions/checkout@v4

      - name: Build Satis
        run: |
          mkdir -p output
          docker run --rm \
            -v ${{ github.workspace }}:/build \
            -e COMPOSER_AUTH='{"github-oauth": {"github.com": "${{ secrets.MY_SATIS_TOKEN }}"}}' \
            composer/satis /bin/sh -c "git config --global --add safe.directory /build && php /satis/bin/satis build satis.json output"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./output

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Delete old workflow runs
        run: |
          RUNS_TO_DELETE=$(gh run list --json databaseId | jq -r '.[3:].[] | .databaseId')
          
          for run_id in $RUNS_TO_DELETE; do
            gh run delete "$run_id"
          done
        env:
          GH_TOKEN: ${{ github.token }}
